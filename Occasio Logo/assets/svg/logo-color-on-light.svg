    </linearGradient>
  </defs>
  <text x="350" y="90" class="word" font-size="60" text-anchor="middle" fill="#0d0a1f">OCCASIO</text>
  <rect x="180" y="110" width="340" height="4" fill="url(#beam)"></rect>
  <text x="350" y="170" class="sub" font-size="13" text-anchor="middle" fill="#0d0a1f" opacity="0.6">S T R A T E G Y</text>
