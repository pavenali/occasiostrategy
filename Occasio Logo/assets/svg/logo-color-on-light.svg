<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 220" width="700" height="220">

  

  <defs>
    <linearGradient id="beam" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.05"></stop>
      <stop offset="65%" stop-color="#8b5cf6"></stop>
      <stop offset="100%" stop-color="#a78bfa"></stop>
    </linearGradient>
    <linearGradient id="beam-rev" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.1"></stop>
      <stop offset="65%" stop-color="#ffffff"></stop>
      <stop offset="100%" stop-color="#c4b5fd"></stop>
    </linearGradient>
    <linearGradient id="beam-black" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#0d0a1f" stop-opacity="0.05"></stop>
      <stop offset="65%" stop-color="#0d0a1f"></stop>
      <stop offset="100%" stop-color="#0d0a1f"></stop>
    </linearGradient>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
