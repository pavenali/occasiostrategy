<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<title>Occasio — Logo v2 · Violet</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

<style>
  :root {
    --ink:      #0d0a1f;   /* deep purple-black, matches site bg */
    --ink-2:    #1a1334;   /* slightly lighter for layered surfaces */
    --paper:    #f6f3ff;   /* off-white with violet undertone */
    --paper-2:  #ece6ff;
    --violet:   #a78bfa;   /* primary accent — matches site heading */
    --violet-2: #8b5cf6;   /* mid */
    --violet-3: #c4b5fd;   /* light */
    --violet-4: #6d4ed8;   /* dark */
  }
  html, body { margin: 0; padding: 0; }
  body { font-family: 'Manrope', system-i, sans-serif; background: #f0eee9; color: var(--ink); }

  .logo-tile {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    position: relative;
    overflow: hidden;
  }
  .logo-tile.dark  { background: var(--ink);   color: var(--paper); }
  .logo-tile.darker{ background: #08061a;      color: var(--paper); }
  .logo-tile.paper { background: var(--paper); color: var(--ink); }

  .tile-caption {
    position: absolute;
    bottom: 14px;
    left: 16px;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 9px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    opacity: 0.45;
  }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="logos-v2.jsx"></script>
<script type="text/babel" src="app-v2.jsx"></script>
</head>
<body>
<div id="root"></div>
</body>
</html>
